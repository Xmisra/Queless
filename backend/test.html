<!DOCTYPE html>
<html lang="en">

<head>

<body>
    <script src="/socket.io/socket.io.js"></script>

    <script>
        const socket = io("http://localhost:8080");

        socket.on("connect", () => {
            console.log("Connected!", socket.id);

            socket.emit(
                "join-queue",
                "6a345f95ef80a715b39b69d8"
            );
        });

        socket.on("customer-called", (data) => {
            console.log("Customer Called:", data);
        });
    </script>
</body>
